<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Verify email - ArchiveDB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(168, 85, 247, 0.24), transparent 32%), radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.22), transparent 30%), #0f172a;
      color: #e5e7eb; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card { width: 100%; max-width: 430px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(148, 163, 184, 0.25); border-radius: 22px; padding: 28px; box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45); backdrop-filter: blur(14px); }
    .badge { display: inline-flex; padding: 7px 11px; border-radius: 999px; background: rgba(168, 85, 247, 0.14); color: #e9d5ff; font-size: 13px; margin-bottom: 16px; font-weight: 700; }
    h1 { margin: 0 0 8px; font-size: 30px; letter-spacing: -0.04em; }
    .subtitle { margin: 0 0 20px; color: #94a3b8; line-height: 1.5; font-size: 14px; }
    .email-box { margin: 0 0 18px; padding: 13px 14px; border-radius: 14px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.25); color: #bfdbfe; font-size: 14px; line-height: 1.45; word-break: break-word; }
    .error { margin: 0 0 16px; padding: 12px 14px; border-radius: 14px; background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.35); color: #fecaca; font-size: 14px; line-height: 1.45; }
    label { display: block; margin: 14px 0 7px; color: #cbd5e1; font-size: 14px; font-weight: 700; }
    input { width: 100%; padding: 14px; border-radius: 13px; border: 1px solid rgba(148, 163, 184, 0.32); background: rgba(2, 6, 23, 0.7); color: #f8fafc; font-size: 20px; letter-spacing: 0.18em; text-align: center; outline: none; }
    input::placeholder { color: #64748b; letter-spacing: normal; text-align: center; }
    input:focus { border-color: #a78bfa; box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.13); }
    button { width: 100%; margin-top: 20px; padding: 13px 16px; border: 0; border-radius: 14px; background: linear-gradient(135deg, #a855f7, #0ea5e9); color: white; font-size: 15px; font-weight: 800; cursor: pointer; }
    button:hover { filter: brightness(1.08); }
    .links { margin-top: 20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; color: #94a3b8; font-size: 14px; }
    a { color: #93c5fd; text-decoration: none; font-weight: 800; }
    a:hover { text-decoration: underline; }
    .footer { margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(148, 163, 184, 0.18); color: #64748b; font-size: 12px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Email verification</div>
    <h1>Enter your code</h1>
    <p class="subtitle">We sent a 6-digit verification code to your email.</p>
    <div class="email-box">
      Code sent to:<br>
      <strong>{{ email }}</strong>
    </div>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('verify') }}">
      <input type="hidden" name="email" value="{{ email }}">
      <label for="code">Verification code</label>
      <input id="code" name="code" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="6-digit code" autocomplete="one-time-code" required>
      <button type="submit">Verify email</button>
    </form>
    <div class="links">
      <span>Did not get it?</span>
      <a href="{{ url_for('register') }}">Register again</a>
    </div>
    <div class="footer">Codes expire quickly. If yours expired, register again to generate a new key.</div>
  </main>
</body>
</html>
