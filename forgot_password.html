<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Forgot password - ArchiveDB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #334155, transparent 35%), #0f172a;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      color: #94a3b8;
      line-height: 1.5;
    }

    .notice {
      background: rgba(250, 204, 21, 0.1);
      border: 1px solid rgba(250, 204, 21, 0.28);
      color: #fde68a;
      padding: 13px;
      border-radius: 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fecaca;
      padding: 13px;
      border-radius: 14px;
      font-size: 14px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin: 14px 0 7px;
      font-weight: 700;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border-radius: 13px;
      border: 1px solid rgba(148, 163, 184, 0.32);
      background: rgba(2, 6, 23, 0.7);
      color: #f8fafc;
      font-size: 15px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 13px 16px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, #f59e0b, #ec4899);
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    a {
      color: #93c5fd;
      text-decoration: none;
      font-weight: 800;
    }

    .links {
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Forgot password?</h1>
    <p>Enter your approved email. A reset code will be sent if the account exists.</p>

    <div class="notice">
      If your email is not currently approved, send your email to <strong>@sigma619</strong> again to get access.
    </div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/forgot">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>
      <button type="submit">Send reset code</button>
    </form>

    <div class="links">
      <a href="/login">Back to login</a>
    </div>
  </main>
</body>
</html>
