<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reset password - ArchiveDB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(14, 165, 233, 0.24), transparent 32%), radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.22), transparent 30%), #0f172a;
      color: #e5e7eb; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card { width: 100%; max-width: 430px; background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(148, 163, 184, 0.25); border-radius: 22px; padding: 28px; box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45); backdrop-filter: blur(14px); }
    .badge { display: inline-flex; padding: 7px 11px; border-radius: 999px; background: rgba(14, 165, 233, 0.14); color: #bae6fd; font-size: 13px; margin-bottom: 16px; font-weight: 700; }
    h1 { margin: 0 0 8px; font-size: 30px; letter-spacing: -0.04em; }
    .subtitle { margin: 0 0 20px; color: #94a3b8; line-height: 1.5; font-size: 14px; }
    .email-box { margin: 0 0 18px; padding: 13px 14px; border-radius: 14px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.25); color: #bfdbfe; font-size: 14px; line-height: 1.45; word-break: break-word; }
    .error { margin: 0 0 16px; padding: 12px 14px; border-radius: 14px; background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.35); color: #fecaca; font-size: 14px; line-height: 1.45; }
    label { display: block; margin: 14px 0 7px; color: #cbd5e1; font-size: 14px; font-weight: 700; }
    input { width: 100%; padding: 13px 14px; border-radius: 13px; border: 1px solid rgba(148, 163, 184, 0.32); background: rgba(2, 6, 23, 0.7); color: #f8fafc; font-size: 15px; outline: none; }
    input:focus { border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.13); }
    button { width: 100%; margin-top: 20px; padding: 13px 16px; border: 0; border-radius: 14px; background: linear-gradient(135deg, #0ea5e9, #a855f7); color: white; font-size: 15px; font-weight: 800; cursor: pointer; }
    button:hover { filter: brightness(1.08); }
    .links { margin-top: 20px; text-align: center; color: #94a3b8; font-size: 14px; }
    a { color: #93c5fd; text-decoration: none; font-weight: 800; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Reset password</div>
    <h1>Set new password</h1>
    <p class="subtitle">Enter the reset code from your email and choose a new password.</p>
    
    <div class="email-box">
      Enter the same email where you received the reset code.
    </div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('reset_password') }}">
      <label for="email">Email</label>
      <input
        id="email"
        name="email"
        type="email"
        value="{{ email if email else '' }}"
        placeholder="you@example.com"
        autocomplete="email"
        required
      >

      <label for="code">Reset code</label>
      <input 
        id="code" 
        name="code" 
        inputmode="numeric" 
        pattern="[0-9]*" 
        maxlength="6" 
        placeholder="6-digit code" 
        autocomplete="one-time-code" 
        required
      >

      <label for="password">New password</label>
      <input 
        id="password" 
        name="password" 
        type="password" 
        placeholder="New password, 8+ characters" 
        autocomplete="new-password" 
        minlength="8;+" 
        required
      >

      <button type="submit">Reset password</button>
    </form>

    <div class="links">
      <a href="{{ url_for('forgot_password') }}">Request a new code</a>
      ·
      <a href="{{ url_for('login') }}">Back to login</a>
    </div>
  </main>
</body>
</html>
